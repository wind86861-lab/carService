name: Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autoservice_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r autoservice/requirements.txt pytest pytest-asyncio httpx
      - run: pytest autoservice/tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/autoservice_test
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost/autoservice_test
          BOT_TOKEN: fake_token_for_tests
          SECRET_KEY: test_secret_key_32chars_long_xxxx
          ADMIN_IDS: "123456789"
          BOT_USERNAME: testbot
          WEB_URL: http://localhost:8000
          UPLOAD_DIR: /tmp/uploads

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/autoservice
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
